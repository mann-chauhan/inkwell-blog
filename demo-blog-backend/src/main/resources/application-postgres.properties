spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/spring-mvc-blog}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}

spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jooq.sql-dialect=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create}
#spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
#spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}
spring.datasource.hikari.auto-commit=false
jwt.secret=${JWT_SECRET:change-me-to-a-secure-secret-that-is-at-least-32-characters-long}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
